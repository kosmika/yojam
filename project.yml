name: Yojam
options:
  bundleIdPrefix: com.yojam
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.1.5"
    CURRENT_PROJECT_VERSION: "9"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

targets:
  YojamCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/YojamCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yojam.core
        APPLICATION_EXTENSION_API_ONLY: YES
        PRODUCT_NAME: YojamCore
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: YojamCore
        CURRENT_PROJECT_VERSION: "$(CURRENT_PROJECT_VERSION)"
        MARKETING_VERSION: "$(MARKETING_VERSION)"

  Yojam:
    type: application
    platform: macOS
    sources:
      - path: Sources/Yojam
        excludes:
          - Resources/Info.plist
          - Resources/Yojam.entitlements
          - Resources/menubar.svg
    dependencies:
      - target: YojamCore
        embed: true
      - target: YojamShareExtension
        embed: true
        codeSign: true
        copy:
          destination: plugins
      - target: YojamSafariExtension
        embed: true
        codeSign: true
        copy:
          destination: plugins
      - target: YojamNativeHost
        embed: true
        codeSign: true
        copy:
          destination: executables
      - package: Sparkle
    info:
      path: Sources/Yojam/Resources/Info.plist
      properties:
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.utilities
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        SUFeedURL: https://yoj.am/appcast.xml
        SUPublicEDKey: ewMIKU3we8bcoyPz/88uD1n1fpThNNnDJIfXk/eHLGA=
        SUEnableAutomaticChecks: true
        CFBundleURLTypes:
          - CFBundleURLName: Web URL
            CFBundleURLSchemes:
              - http
              - https
          - CFBundleURLName: Mail URL
            CFBundleURLSchemes:
              - mailto
          - CFBundleURLName: Yojam Control
            CFBundleURLSchemes:
              - yojam
        NSAppleEventsUsageDescription: "Yojam needs to send Apple Events to open private browsing windows in Safari and Orion."
        NSUserActivityTypes:
          - NSUserActivityTypeBrowsingWeb
        CFBundleDocumentTypes:
          - CFBundleTypeName: HTML Document
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - public.html
            LSHandlerRank: Default
          - CFBundleTypeName: XHTML Document
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - public.xhtml
            LSHandlerRank: Default
          - CFBundleTypeName: Web Internet Location
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.apple.web-internet-location
              - com.apple.internet-location
              - public.url
        NSServices:
          - NSMenuItem:
              default: Open in Yojam
            NSMessage: openURLViaService
            NSPortName: Yojam
            NSSendTypes:
              - public.url
              - public.plain-text
    entitlements:
      path: Sources/Yojam/Resources/Yojam.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: "$(TeamIdentifierPrefix)$(CFBundleIdentifier)"
        com.apple.security.automation.apple-events: true
        com.apple.security.application-groups:
          - group.org.yojam.shared
    settings:
      base:
        INFOPLIST_FILE: Sources/Yojam/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Yojam/Resources/Yojam.entitlements
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.yojam.app
        PRODUCT_NAME: Yojam
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"

  YojamShareExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/YojamShareExtension
        excludes:
          - Info.plist
          - YojamShareExtension.entitlements
    dependencies:
      - target: YojamCore
        embed: false
    info:
      path: Sources/YojamShareExtension/Info.plist
    entitlements:
      path: Sources/YojamShareExtension/YojamShareExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.org.yojam.shared
    settings:
      base:
        INFOPLIST_FILE: Sources/YojamShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/YojamShareExtension/YojamShareExtension.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.yojam.app.ShareExtension
        PRODUCT_NAME: YojamShareExtension
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: YES
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"

  YojamSafariExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/YojamSafariExtension
        excludes:
          - Info.plist
          - YojamSafariExtension.entitlements
          - Resources
    dependencies:
      - target: YojamCore
        embed: false
    info:
      path: Sources/YojamSafariExtension/Info.plist
    entitlements:
      path: Sources/YojamSafariExtension/YojamSafariExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.org.yojam.shared
    settings:
      base:
        INFOPLIST_FILE: Sources/YojamSafariExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/YojamSafariExtension/YojamSafariExtension.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.yojam.app.SafariExtension
        PRODUCT_NAME: YojamSafariExtension
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: YES
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"
    preBuildScripts:
      - name: Copy Safari Extension Resources
        basedOnDependencyAnalysis: false
        script: |
          rsync -av --delete "${SRCROOT}/Extensions/shared/" "${SRCROOT}/Sources/YojamSafariExtension/Resources/"
          cp "${SRCROOT}/Extensions/safari/manifest.json" "${SRCROOT}/Sources/YojamSafariExtension/Resources/"

  YojamNativeHost:
    type: tool
    platform: macOS
    sources:
      - path: Sources/YojamNativeHost
        excludes:
          - YojamNativeHost.entitlements
    dependencies:
      - target: YojamCore
        embed: false
    entitlements:
      path: Sources/YojamNativeHost/YojamNativeHost.entitlements
      properties:
        com.apple.security.application-groups:
          - group.org.yojam.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yojam.app.NativeHost
        PRODUCT_NAME: YojamNativeHost
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Sources/YojamNativeHost/YojamNativeHost.entitlements
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"

  YojamCLI:
    type: tool
    platform: macOS
    sources:
      - path: Sources/YojamCLI
        excludes:
          - YojamCLI.entitlements
    dependencies:
      - target: YojamCore
        embed: false
    entitlements:
      path: Sources/YojamCLI/YojamCLI.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yojam.app.CLI
        PRODUCT_NAME: yojam-cli
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Sources/YojamCLI/YojamCLI.entitlements
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"

  YojamTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/YojamTests
    dependencies:
      - target: Yojam
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Yojam.app/Contents/MacOS/Yojam"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES

  YojamCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/YojamCoreTests
    dependencies:
      - target: YojamCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
